name: image-build

on:
    pull_request:
    push:
        branches:
            - main
    workflow_dispatch:
        inputs:
            push_image:
                description: Push built image to GHCR
                required: true
                type: boolean
                default: false

jobs:
    docker-build:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        env:
            IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/aliyun-cdn-cert-sync
            SHOULD_PUSH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.push_image == 'true' }}
        steps:
            - name: Check out repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GHCR
              if: env.SHOULD_PUSH == 'true'
              uses: docker/login-action@v3
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Derive image metadata
              id: meta
              uses: docker/metadata-action@v5
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=sha,format=short,prefix=sha-
                      type=ref,event=branch
                      type=ref,event=pr
                      type=ref,event=tag
                  labels: |
                      org.opencontainers.image.title=aliyun-cdn-cert-sync
                      org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
                      org.opencontainers.image.revision=${{ github.sha }}

            - name: Build container image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  file: ./Dockerfile
                  push: ${{ env.SHOULD_PUSH == 'true' }}
                  load: ${{ env.SHOULD_PUSH != 'true' }}
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
